<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- App icon candidate: brass pressure gauge on a riveted iron plate. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#3a2d1e"/>
      <stop offset="70%" stop-color="#1c1610"/>
      <stop offset="100%" stop-color="#0f0c08"/>
    </radialGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eec96f"/>
      <stop offset="45%" stop-color="#c49a42"/>
      <stop offset="100%" stop-color="#7d5c22"/>
    </linearGradient>
    <radialGradient id="face" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#241c11"/>
      <stop offset="100%" stop-color="#120d07"/>
    </radialGradient>
  </defs>
  <rect x="8" y="8" width="496" height="496" rx="112" fill="url(#bg)"/>
  <!-- corner rivets -->
  <g fill="#6b5638">
    <circle cx="76" cy="76" r="13"/><circle cx="436" cy="76" r="13"/>
    <circle cx="76" cy="436" r="13"/><circle cx="436" cy="436" r="13"/>
  </g>
  <g fill="#8f7448" opacity="0.9">
    <circle cx="73" cy="73" r="6"/><circle cx="433" cy="73" r="6"/>
    <circle cx="73" cy="433" r="6"/><circle cx="433" cy="433" r="6"/>
  </g>
  <!-- gauge bezel -->
  <circle cx="256" cy="262" r="172" fill="url(#brass)"/>
  <circle cx="256" cy="262" r="148" fill="url(#face)"/>
  <!-- dial ticks -->
  <g stroke="#d9b25e" stroke-width="8" stroke-linecap="round">
    <line x1="256" y1="136" x2="256" y2="164"/>
    <line x1="150" y1="200" x2="174" y2="214"/>
    <line x1="150" y1="324" x2="174" y2="310"/>
    <line x1="256" y1="388" x2="256" y2="360"/>
  </g>
  <g stroke="#c0392b" stroke-width="8" stroke-linecap="round">
    <line x1="362" y1="200" x2="338" y2="214"/>
    <line x1="362" y1="324" x2="338" y2="310"/>
  </g>
  <!-- needle, into the red -->
  <line x1="256" y1="262" x2="352" y2="176" stroke="#d64541" stroke-width="14" stroke-linecap="round"/>
  <circle cx="256" cy="262" r="20" fill="url(#brass)"/>
  <!-- bezel screw-lug at bottom -->
  <rect x="238" y="422" width="36" height="26" rx="8" fill="url(#brass)"/>
</svg>
