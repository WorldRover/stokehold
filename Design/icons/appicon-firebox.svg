<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- App icon candidate: firebox door glowing from within. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#3a2d1e"/>
      <stop offset="70%" stop-color="#1c1610"/>
      <stop offset="100%" stop-color="#0f0c08"/>
    </radialGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eec96f"/>
      <stop offset="45%" stop-color="#c49a42"/>
      <stop offset="100%" stop-color="#7d5c22"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="80%" r="80%">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="45%" stop-color="#e2571b"/>
      <stop offset="100%" stop-color="#3a0e04"/>
    </radialGradient>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="60%" stop-color="#f2762a"/>
      <stop offset="100%" stop-color="#d63b17"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="496" height="496" rx="112" fill="url(#bg)"/>
  <!-- door plate -->
  <rect x="96" y="72" width="320" height="368" rx="28" fill="url(#brass)"/>
  <rect x="112" y="88" width="288" height="336" rx="20" fill="#241a0f"/>
  <!-- door rivets -->
  <g fill="#e3bd67">
    <circle cx="134" cy="110" r="9"/><circle cx="378" cy="110" r="9"/>
    <circle cx="134" cy="402" r="9"/><circle cx="378" cy="402" r="9"/>
    <circle cx="256" cy="104" r="9"/><circle cx="256" cy="408" r="9"/>
    <circle cx="128" cy="256" r="9"/><circle cx="384" cy="256" r="9"/>
  </g>
  <!-- arched window, fire inside -->
  <path d="M156 392 V236 a100 100 0 0 1 200 0 v156 Z" fill="url(#glow)"/>
  <path fill="url(#flame)" d="
    M256 384
    c-46 0 -72 -27 -72 -62
    c0 -30 19 -49 33 -69
    c11 -16 20 -31 23 -53
    c21 16 47 42 47 72
    c9 -6 15 -16 17 -28
    c14 16 24 36 24 56
    c0 47 -30 84 -72 84 Z"/>
  <path fill="#ffe9a8" d="
    M256 384
    c-20 0 -32 -12 -32 -28
    c0 -14 8 -22 15 -31
    c5 -7 9 -14 10 -24
    c9 7 21 19 21 32
    c4 -3 6 -7 7 -12
    c6 7 11 16 11 25
    c0 21 -13 38 -32 38 Z"/>
  <!-- latch -->
  <rect x="196" y="180" width="120" height="22" rx="11" fill="url(#brass)"/>
</svg>
