<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
  <!-- Menubar template glyph: stoker's coal shovel, diagonal. D-grip at the
       top-left, straight shaft, broad scoop at the bottom-right. -->
  <g transform="rotate(45 18 18)">
    <!-- D-grip -->
    <path d="M18 3 a4.2 4.2 0 0 1 4.2 4.2 v1.6 h-8.4 V7.2 A4.2 4.2 0 0 1 18 3 Z
             M18 5.6 a1.9 1.9 0 0 0 -1.9 1.9 v0.7 h3.8 v-0.7 a1.9 1.9 0 0 0 -1.9 -1.9 Z"
          fill="#000" fill-rule="evenodd"/>
    <!-- shaft -->
    <rect x="16.6" y="8.8" width="2.8" height="10.2" fill="#000"/>
    <!-- scoop -->
    <path fill="#000" d="M11.5 19 h13 v6.5 a6.5 5.5 0 0 1 -6.5 5.5 a6.5 5.5 0 0 1 -6.5 -5.5 Z"/>
  </g>
</svg>
